name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE: iec61850-server
  DOCKER_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish FullApi
        run: |
          dotnet publish FullApi/FullApi.csproj -c Release -o publish-full

      - name: Build Docker image
        run: |
          docker build --no-cache -f Dockerfile.final -t $DOCKER_IMAGE:$DOCKER_TAG -t $DOCKER_IMAGE:latest .

      - name: Save Docker image
        run: docker save $DOCKER_IMAGE:$DOCKER_TAG | gzip > iec61850-server.tar.gz

      - name: Copy files and deploy
        uses: appleboy/ssh-action@master
        env:
          DOCKER_IMAGE: iec61850-server
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/iec61850-server

            # Wait a moment for file transfer
            echo "Preparing for deployment..."

      - name: Copy Docker image to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no iec61850-server.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        env:
          DOCKER_IMAGE: iec61850-server
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/iec61850-server

            # Load Docker image
            docker load < /tmp/iec61850-server.tar.gz

            # Stop old container
            docker stop iec61850-server 2>/dev/null || true
            docker rm iec61850-server 2>/dev/null || true

            # Run new container
            docker run -d \
              --name iec61850-server \
              --restart unless-stopped \
              -p 8080:80 \
              -p 8102:8102 \
              -v iec61850-filestore:/app/libiec61850_full/build/examples/server_example_files/vmd-filestore \
              iec61850-server:latest

            # Cleanup old images
            docker image prune -af --filter "until=24h"
            rm /tmp/iec61850-server.tar.gz

            echo "✅ Deployment successful!"

      - name: Health check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🔍 Checking container status..."
            docker ps | grep iec61850-server || exit 1

            echo "🔍 Checking Web API health..."
            sleep 5
            curl -f http://localhost:8080/health || exit 1

            echo "✅ All health checks passed!"
