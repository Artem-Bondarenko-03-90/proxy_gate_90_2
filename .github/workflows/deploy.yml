name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE: iec61850-server
  DOCKER_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish FullApi
        run: |
          dotnet publish FullApi/FullApi.csproj -c Release -o publish-full

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.final -t $DOCKER_IMAGE:$DOCKER_TAG -t $DOCKER_IMAGE:latest .

      - name: Save Docker image
        run: docker save $DOCKER_IMAGE:$DOCKER_TAG | gzip > iec61850-server.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Docker image to server
        run: |
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} iec61850-server.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      - name: Copy deploy script to server
        run: |
          cat << 'SCRIPT' | ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cat > /tmp/deploy.sh"
          #!/bin/bash
          set -e

          # Create directory if not exists
          sudo mkdir -p /opt/iec61850-server
          sudo chown $USER:$USER /opt/iec61850-server

          cd /opt/iec61850-server

          # Load Docker image
          docker load < /tmp/iec61850-server.tar.gz

          # Stop old container
          docker stop iec61850-server 2>/dev/null || true
          docker rm iec61850-server 2>/dev/null || true

          # Run new container
          docker run -d \
            --name iec61850-server \
            --restart unless-stopped \
            -p 8080:80 \
            -p 8102:8102 \
            -v iec61850-filestore:/app/libiec61850_full/build/examples/server_example_files/vmd-filestore \
            $DOCKER_IMAGE:latest

          # Cleanup old images
          docker image prune -af --filter "until=24h"
          rm /tmp/iec61850-server.tar.gz

          echo "✅ Deployment successful!"
          SCRIPT

          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "chmod +x /tmp/deploy.sh"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "/tmp/deploy.sh"

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            echo "🔍 Checking container status..."
            docker ps | grep iec61850-server || exit 1

            echo "🔍 Checking Web API health..."
            sleep 5
            curl -f http://localhost:8080/health || exit 1

            echo "✅ All health checks passed!"
          ENDSSH
