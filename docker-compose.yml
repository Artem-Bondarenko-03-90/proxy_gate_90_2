version: '3.8'

services:
  iec61850-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iec61850-server
    ports:
      - "8080:80"      # Web API
      - "8102:8102"    # IEC-61850 Server
      - "8102:8102/udp"
    volumes:
      # Persist filestore
      - iec61850-filestore:/app/libiec61850_full/examples/server_example_files/vmd-filestore
      # Optional: Mount custom CID files
      - ./cid-files:/app/cid-files:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/server/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  iec61850-filestore:
    driver: local
